<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Guru v2</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #1f2937; margin-bottom: 20px; }
        input, select { width: 90%; padding: 10px; margin-bottom: 15px; border: 1px solid #d1d5db; border-radius: 5px; font-size: 16px; text-align: center; }
        button { color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-primary { background-color: #3b82f6; }
        .btn-success { background-color: #10b981; }
        .btn-purple { background-color: #8b5cf6; }
        .btn-orange { background-color: #f97316; }
        .btn-danger { background-color: #ef4444; }
        .btn-secondary { background-color: #6b7280; }
        
        #dashboard-section, #scanner-section, #recap-section, #manual-section { display: none; }
        #reader { width: 100%; margin-top: 15px; }
        .message { margin-top: 15px; padding: 10px; border-radius: 5px; font-weight: bold; display: none; }
        .success { background-color: #d1fae5; color: #065f46; }
        .error { background-color: #fee2e2; color: #991b1b; }
        .loading { background-color: #fef3c7; color: #92400e; }
        
        .rekap-list { text-align: left; background: #f9fafb; padding: 15px; border-radius: 5px; max-height: 250px; overflow-y: auto; font-size: 14px; }
        .rekap-list ul { margin: 0; padding-left: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" style="display: block;">
        <h2>Login Guru</h2>
        <input type="password" id="pin-input" placeholder="Masukkan PIN 6 Angka" autocomplete="off">
        <button class="btn-primary" onclick="login()">Masuk</button>
        <div id="login-msg" class="message"></div>
    </div>

    <div id="dashboard-section">
        <h2>Dashboard Guru</h2>
        <p id="dash-guru-name" style="color: #4b5563; font-weight: bold; margin-bottom: 20px;"></p>
        <button class="btn-success" onclick="showScanner()">📷 Mulai Scan QR</button>
        <button class="btn-orange" onclick="showManualInput()">📝 Input Manual (Siswa/Izin)</button>
        <button class="btn-purple" onclick="showRecap()">📋 Rekap Absen Hari Ini</button>
        <button class="btn-danger" onclick="logout()">🚪 Keluar</button>
    </div>

    <div id="scanner-section">
        <h2>Scanner Kelas</h2>
        <div id="reader"></div>
        <div id="scan-msg" class="message"></div>
        <button class="btn-secondary" onclick="backToDashboard()">⬅️ Kembali ke Dashboard</button>
    </div>

    <div id="recap-section">
        <h2>Rekap Hari Ini</h2>
        <div id="recap-msg" class="message"></div>
        <div class="rekap-list" id="rekap-data"></div>
        <button class="btn-secondary" onclick="backToDashboard()">⬅️ Kembali ke Dashboard</button>
    </div>

    <div id="manual-section">
        <h2>Input Absen Manual</h2>
        <div id="manual-msg" class="message"></div>
        
        <label style="display:block; text-align:left; margin-left:18px; font-weight:bold;">Pilih Kelas:</label>
        <select id="select-kelas" onchange="filterSiswaByKelas()">
            <option value="">-- Pilih Kelas --</option>
        </select>

        <label style="display:block; text-align:left; margin-left:18px; font-weight:bold;">Pilih Siswa:</label>
        <select id="select-siswa">
            <option value="">-- Pilih Siswa --</option>
        </select>

        <label style="display:block; text-align:left; margin-left:18px; font-weight:bold;">Keterangan:</label>
        <select id="select-status">
            <option value="Hadir">Hadir (Ketinggalan Kartu)</option>
            <option value="Sakit">Sakit</option>
            <option value="Izin">Izin</option>
            <option value="Alfa">Alfa</option>
        </select>

        <button class="btn-success" onclick="simpanAbsenManual()">Simpan Absen</button>
        <button class="btn-secondary" onclick="backToDashboard()">⬅️ Kembali</button>
    </div>
</div>

<script>
    // MASUKIN URL BARU LO DI SINI!
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyD4KkjadWfKKykPU9Z5l9p6P6AFfBRQ2a8s9o8oJGHu1nX2SdhEzP5ojqfN6B7iVFkJQ/exec"; 
    
    let html5QrcodeScanner;
    let namaGuru = "";
    let isScanningProcess = false;
    let masterSiswa = []; // Nyimpan data siswa dari server

    function showMessage(elementId, text, type) {
        const el = document.getElementById(elementId);
        el.innerText = text; el.className = "message " + type; el.style.display = "block";
        if (type !== 'loading') setTimeout(() => { el.style.display = "none"; }, 3000);
    }

    function switchView(viewId) {
        document.getElementById("login-section").style.display = "none";
        document.getElementById("dashboard-section").style.display = "none";
        document.getElementById("scanner-section").style.display = "none";
        document.getElementById("recap-section").style.display = "none";
        document.getElementById("manual-section").style.display = "none";
        document.getElementById(viewId).style.display = "block";
    }

    // LOGIN
    function login() {
        const pin = document.getElementById("pin-input").value;
        if (!pin) return;
        showMessage("login-msg", "Mengecek PIN...", "loading");

        fetch(GAS_URL, {
            method: 'POST', body: JSON.stringify({ action: "login", pin: pin }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        }).then(res => res.json()).then(data => {
            if (data.status === "success") {
                namaGuru = data.nama_guru;
                document.getElementById("dash-guru-name").innerText = "Halo, " + namaGuru;
                switchView("dashboard-section");
            } else showMessage("login-msg", data.message, "error");
        }).catch(() => showMessage("login-msg", "Error jaringan!", "error"));
    }

    // DASHBOARD KE SCANNER
    function showScanner() {
        switchView("scanner-section");
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        html5QrcodeScanner.render(onScanSuccess);
    }

    function onScanSuccess(decodedText) {
        if (isScanningProcess) return;
        isScanningProcess = true;
        let audio = new Audio('https://www.soundjay.com/buttons/beep-07a.mp3'); audio.play().catch(e=>{});
        showMessage("scan-msg", "Mengirim data...", "loading");

        fetch(GAS_URL, {
            method: 'POST', body: JSON.stringify({ action: "absen", nis: decodedText, nama_guru: namaGuru }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        }).then(res => res.json()).then(data => {
            showMessage("scan-msg", data.message, data.status === "success" ? "success" : "error");
            setTimeout(() => { isScanningProcess = false; }, 2000);
        }).catch(() => {
            showMessage("scan-msg", "Error jaringan!", "error");
            setTimeout(() => { isScanningProcess = false; }, 2000);
        });
    }

    // LOGIKA ABSEN MANUAL
    function showManualInput() {
        switchView("manual-section");
        showMessage("manual-msg", "Memuat data siswa & kelas...", "loading");
        
        fetch(GAS_URL, {
            method: 'POST', body: JSON.stringify({ action: "get_siswa_manual" }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        }).then(res => res.json()).then(data => {
            document.getElementById("manual-msg").style.display = "none";
            if (data.status === "success") {
                masterSiswa = data.siswa;
                
                // Isi Dropdown Kelas
                let kelasSelect = document.getElementById("select-kelas");
                kelasSelect.innerHTML = '<option value="">-- Pilih Kelas --</option>';
                data.kelas.forEach(k => {
                    kelasSelect.innerHTML += `<option value="${k}">${k}</option>`;
                });
            }
        }).catch(() => showMessage("manual-msg", "Gagal memuat data!", "error"));
    }

    function filterSiswaByKelas() {
        const kelasDipilih = document.getElementById("select-kelas").value;
        let siswaSelect = document.getElementById("select-siswa");
        siswaSelect.innerHTML = '<option value="">-- Pilih Siswa --</option>';

        if (!kelasDipilih) return;

        // PERBAIKAN: Paksa data menjadi String dan hapus spasi gaib pakai .trim()
        const siswaFiltered = masterSiswa.filter(s => String(s.kelas).trim() === String(kelasDipilih).trim());
        
        siswaFiltered.forEach(s => {
            siswaSelect.innerHTML += `<option value="${s.nis}" data-nama="${s.nama}">${s.nama}</option>`;
        });
    }

    function simpanAbsenManual() {
        const selectKelas = document.getElementById("select-kelas").value;
        const selectSiswa = document.getElementById("select-siswa");
        const nis = selectSiswa.value;
        const statusAbsen = document.getElementById("select-status").value;

        if (!selectKelas || !nis) {
            alert("Harap pilih kelas dan siswa terlebih dahulu!");
            return;
        }

        const namaSiswa = selectSiswa.options[selectSiswa.selectedIndex].getAttribute("data-nama");
        showMessage("manual-msg", "Menyimpan...", "loading");

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ 
                action: "simpan_manual", 
                nis: nis, 
                nama: namaSiswa, 
                kelas: selectKelas, 
                nama_guru: namaGuru,
                status_absen: statusAbsen 
            }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        }).then(res => res.json()).then(data => {
            if (data.status === "success") {
                showMessage("manual-msg", data.message, "success");
                // Reset dropdown siswa setelah berhasil input
                document.getElementById("select-siswa").value = "";
            } else {
                showMessage("manual-msg", data.message, "error");
            }
        }).catch(() => showMessage("manual-msg", "Gagal menyimpan data!", "error"));
    }

    // REKAP
    function showRecap() {
        switchView("recap-section");
        showMessage("recap-msg", "Mengambil data...", "loading");
        document.getElementById("recap-data").innerHTML = "";

        fetch(GAS_URL, {
            method: 'POST', body: JSON.stringify({ action: "rekap", nama_guru: namaGuru }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        }).then(res => res.json()).then(data => {
            document.getElementById("recap-msg").style.display = "none";
            if (data.status === "success" && data.data.length > 0) {
                let html = "<ul>";
                data.data.forEach(siswa => { html += "<li>" + siswa + "</li>"; });
                html += "</ul>";
                document.getElementById("recap-data").innerHTML = html;
            } else {
                document.getElementById("recap-data").innerHTML = "<p style='text-align:center;'>Belum ada data absen hari ini.</p>";
            }
        }).catch(() => showMessage("recap-msg", "Gagal mengambil data!", "error"));
    }

    function backToDashboard() {
        if(html5QrcodeScanner) html5QrcodeScanner.clear();
        switchView("dashboard-section");
    }

    function logout() {
        document.getElementById("pin-input").value = "";
        namaGuru = "";
        switchView("login-section");
    }
</script>

</body>
</html>
